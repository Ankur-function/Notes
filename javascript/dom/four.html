<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning DOM Four</title>
</head>
<body style="background-color: #212121; color: #fff;">
    <div class="language">
        <li>JavaScript</li>
    </div>
</body>
<script>
    function addLanguage(langName){
        const li = document.createElement('li');
        li.innerHTML = langName; // slow way , innerHTML here in this case dom has to traverse from the top of the tree and then adding at the very last.
        document.querySelector('.language').appendChild(li)
    }
    addLanguage('Python'); 
    addLanguage('Typescript')

    function addOptimiseWayLanguage(langName){
      const li = document.createElement('li');
      li.appendChild(document.createTextNode(langName));// createTextNode, much faster directly goes at the bottom and adds it.
      document.querySelector('.language').appendChild(li)
    }
    addOptimiseWayLanguage('goLang')

    // Edit Element
    const secondLang = document.querySelector('li:nth-child(2)'); // study about ':nth-child(2)' most common in CSS.
    // secondLang.innerHTML = 'Mojo' // again innerHTML is not recommended because it is very slow.so wrong way to do.
    const newli = document.createElement('li'); // creating new element
    newli.appendChild(document.createTextNode('Mojo'));// adding content in the new element above. use like this instead of innerHTML
    secondLang.replaceWith(newli); // editing the existing element with our new above one.

    // Edit
    const thirdLang = document.querySelector('li:nth-child(3)');
    const newthirdLang = document.createElement('li');
    newthirdLang.appendChild(document.createTextNode('Ruby'));
    thirdLang.replaceWith(newthirdLang);

    // Remove Element
    const lastLang = document.querySelector('li:last-child')
    lastLang.remove();
    

</script>
</html>
