<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: #212121; color: #fff;">
    
</body>
<script>
    const div = document.createElement('div');// command to create an element in DOM. for e.g. yha pe ek div element create kar rhe hai.
    console.log(div);
    div.className = "main" // adding classes
    div.id = Math.round(Math.random()*10+1); // adding id
    console.log(div.id);
    div.setAttribute("title","generated title");//adding attribute
    div.style.backgroundColor = 'green'
    div.style.padding = '12px'
    // div.innerText = "learning coding"
    const addText = document.createTextNode('learning coding')// works same as above line
     div.appendChild(addText) // adding addText node to div
   // till now we have only make changes in the memory of DOM you can see above values only on browser console. it will not reflect on the UI.
   // unless we attach this child with the document. 
   document.body.appendChild(div)// here attaching child(div here) to the document now it will be visible on UI.
  
</script>
</html>
